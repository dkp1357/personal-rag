# Application
spring.application.name=backend

# Datasource
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=pass
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true

# Error handling
spring.web.error.include-message=always

# Server
server.port=8081

# File
spring.servlet.multipart.enabled=true

# Logging
# logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.springframework=DEBUG

# rag client
rag_client.base_url=${RAG_CLIENT_BASE_URL}

# jwt
jwt.secret=${JWT_SECRET}
jwt.expiration_in_seconds=${JWT_EXPIRATION_IN_SECONDS}

# refresh token
refresh_token.expiration=${REFRESH_TOKEN_EXPIRATION}

# admin
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# upload folder
app.upload_dir=${UPLOAD_DIR}

# Rate Limiting (Resilience4j)
rate-limiter.limit-for-period=5
rate-limiter.limit-refresh-period-seconds=1
rate-limiter.timeout-duration-ms=0

# Actuator - expose rate limiter metrics
management.endpoints.web.exposure.include=health,ratelimiters
management.health.ratelimiters.enabled=true